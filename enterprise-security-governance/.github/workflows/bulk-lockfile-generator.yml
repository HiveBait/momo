name: Bulk Lockfile Remediation

on:
  workflow_dispatch:
    inputs:
      organization:
        description: 'GitHub organization to scan'
        required: true
        type: string
        default: 'HiveBait'
      dry_run:
        description: 'Dry run mode (no PRs created)'
        required: false
        type: boolean
        default: false
      max_repos:
        description: 'Maximum repositories to process (0 = unlimited)'
        required: false
        type: number
        default: 0

jobs:
  discover-repositories:
    name: Discover Repositories Needing Lockfiles
    runs-on: ubuntu-latest
    outputs:
      repositories: ${{ steps.scan.outputs.repositories }}

    steps:
      - name: Scan Organization for Non-Compliant Repos
        id: scan
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Scanning organization: ${{ inputs.organization }}"

          repos=$(gh repo list ${{ inputs.organization }} \
            --limit 1000 \
            --json name,isArchived,primaryLanguage \
            --jq '.[] | select(.isArchived == false) | select(.primaryLanguage.name == "JavaScript" or .primaryLanguage.name == "TypeScript" or .primaryLanguage.name == "Python") | .name')

          # Convert to JSON array
          repo_array=$(echo "$repos" | jq -R -s -c 'split("\n") | map(select(length > 0))')

          echo "repositories=$repo_array" >> $GITHUB_OUTPUT
          echo "Found $(echo "$repo_array" | jq 'length') repositories to check"

  remediate-lockfiles:
    name: Generate Lockfiles for ${{ matrix.repo }}
    needs: discover-repositories
    runs-on: ubuntu-latest
    if: ${{ needs.discover-repositories.outputs.repositories != '[]' }}

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        repo: ${{ fromJson(needs.discover-repositories.outputs.repositories) }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.organization }}/${{ matrix.repo }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Checkout Enterprise Security Governance Templates
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.organization }}/momo
          path: security-tools
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1
          sparse-checkout: |
            enterprise-security-governance/templates/
            enterprise-security-governance/.github/dependabot.yml

      - name: Detect Missing Lockfiles
        id: detect
        run: |
          needs_npm=false
          needs_python_modern=false
          needs_python_legacy=false
          needs_go=false
          needs_java=false

          # Check for Node.js projects without lockfiles
          if [ -f "package.json" ] && [ ! -f "package-lock.json" ]; then
            echo "Missing package-lock.json"
            needs_npm=true
          fi

          # Check for modern Python projects (pyproject.toml) without lockfiles
          if [ -f "pyproject.toml" ] && [ ! -f "poetry.lock" ] && [ ! -f "uv.lock" ]; then
            echo "Missing uv.lock (modern Python project)"
            needs_python_modern=true
          fi

          # Check for legacy Python projects (requirements.txt only) without lockfiles
          if [ -f "requirements.txt" ] && [ ! -f "pyproject.toml" ] && [ ! -f "requirements.lock" ]; then
            echo "Missing requirements.lock (legacy Python project)"
            needs_python_legacy=true
          fi

          # Check for Go projects without lockfiles
          if [ -f "go.mod" ] && [ ! -f "go.sum" ]; then
            echo "Missing go.sum"
            needs_go=true
          fi

          # Check for Java/Gradle projects without lockfiles
          if ([ -f "build.gradle" ] || [ -f "build.gradle.kts" ]) && [ ! -f "gradle.lockfile" ]; then
            echo "Missing gradle.lockfile"
            needs_java=true
          fi

          echo "needs_npm=$needs_npm" >> $GITHUB_OUTPUT
          echo "needs_python_modern=$needs_python_modern" >> $GITHUB_OUTPUT
          echo "needs_python_legacy=$needs_python_legacy" >> $GITHUB_OUTPUT
          echo "needs_go=$needs_go" >> $GITHUB_OUTPUT
          echo "needs_java=$needs_java" >> $GITHUB_OUTPUT

          if [ "$needs_npm" == "false" ] && [ "$needs_python_modern" == "false" ] && [ "$needs_python_legacy" == "false" ] && [ "$needs_go" == "false" ] && [ "$needs_java" == "false" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "✅ Repository already has lockfiles or no lockfiles needed"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Set up Node.js
        if: steps.detect.outputs.needs_npm == 'true' && steps.detect.outputs.skip == 'false'
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python with uv (modern)
        if: steps.detect.outputs.needs_python_modern == 'true' && steps.detect.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python with uv (legacy)
        if: steps.detect.outputs.needs_python_legacy == 'true' && steps.detect.outputs.skip == 'false'
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Go
        if: steps.detect.outputs.needs_go == 'true' && steps.detect.outputs.skip == 'false'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Set up Java
        if: steps.detect.outputs.needs_java == 'true' && steps.detect.outputs.skip == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate npm Lockfile
        if: steps.detect.outputs.needs_npm == 'true' && steps.detect.outputs.skip == 'false'
        continue-on-error: true
        run: |
          set +e
          echo "Generating package-lock.json..."
          npm install --package-lock-only 2> npm_error.log
          if [ $? -eq 0 ]; then
            echo "npm_status=✅ Success" >> $GITHUB_ENV
            echo "npm_lockfile_created=true" >> $GITHUB_ENV
          else
            echo "npm_status=❌ Failed" >> $GITHUB_ENV
            echo "npm_error<<EOF" >> $GITHUB_ENV
            cat npm_error.log >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Generate Python Lockfile (uv.lock for modern projects)
        if: steps.detect.outputs.needs_python_modern == 'true' && steps.detect.outputs.skip == 'false'
        continue-on-error: true
        run: |
          set +e
          echo "Generating uv.lock from pyproject.toml..."
          uv lock 2> uv_error.log
          if [ $? -eq 0 ]; then
            echo "python_modern_status=✅ Success" >> $GITHUB_ENV
            echo "python_lockfile_created=true" >> $GITHUB_ENV
          else
            echo "python_modern_status=❌ Failed" >> $GITHUB_ENV
            echo "python_modern_error<<EOF" >> $GITHUB_ENV
            cat uv_error.log >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Generate Python Lockfile (requirements.lock for legacy projects)
        if: steps.detect.outputs.needs_python_legacy == 'true' && steps.detect.outputs.skip == 'false'
        continue-on-error: true
        run: |
          set +e
          echo "Generating requirements.lock from requirements.txt..."
          uv pip compile requirements.txt --generate-hashes -o requirements.lock 2> requirements_error.log
          if [ $? -eq 0 ]; then
            echo "python_legacy_status=✅ Success" >> $GITHUB_ENV
            echo "python_lockfile_created=true" >> $GITHUB_ENV
          else
            echo "python_legacy_status=❌ Failed" >> $GITHUB_ENV
            echo "python_legacy_error<<EOF" >> $GITHUB_ENV
            cat requirements_error.log >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Generate Go Lockfile
        if: steps.detect.outputs.needs_go == 'true' && steps.detect.outputs.skip == 'false'
        continue-on-error: true
        run: |
          set +e
          echo "Generating go.sum..."
          go mod download 2> go_error.log
          if [ $? -eq 0 ]; then
            echo "go_status=✅ Success" >> $GITHUB_ENV
            echo "go_lockfile_created=true" >> $GITHUB_ENV
          else
            echo "go_status=❌ Failed" >> $GITHUB_ENV
            echo "go_error<<EOF" >> $GITHUB_ENV
            cat go_error.log >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Generate Java Lockfile (Gradle)
        if: steps.detect.outputs.needs_java == 'true' && steps.detect.outputs.skip == 'false'
        continue-on-error: true
        run: |
          set +e
          echo "Generating gradle.lockfile..."
          ./gradlew dependencies --write-locks 2> gradle_error.log || gradle dependencies --write-locks 2> gradle_error.log
          if [ $? -eq 0 ]; then
            echo "java_status=✅ Success" >> $GITHUB_ENV
            echo "java_lockfile_created=true" >> $GITHUB_ENV
          else
            echo "java_status=❌ Failed" >> $GITHUB_ENV
            echo "java_error<<EOF" >> $GITHUB_ENV
            cat gradle_error.log >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Deploy Dependabot Cooldown Configuration
        if: steps.detect.outputs.skip == 'false'
        run: |
          echo "Deploying native Dependabot cooldown policy..."

          # Create .github directory if it doesn't exist
          mkdir -p .github

          # Copy template from security governance repo
          if [ -f "security-tools/enterprise-security-governance/.github/dependabot.yml" ]; then
            cp security-tools/enterprise-security-governance/.github/dependabot.yml .github/dependabot.yml
            echo "dependabot_deployed=true" >> $GITHUB_ENV
            echo "✅ Dependabot configuration deployed"
          else
            echo "⚠️  Warning: Template dependabot.yml not found"
          fi

      # NOTE: Security gate workflow deployment disabled - enforced via GitHub organization policy
      # - name: Deploy Security Gate Workflow (Layer 2)
      #   if: steps.detect.outputs.skip == 'false'
      #   run: |
      #     echo "Deploying security gate workflow..."
      #
      #     # Create .github/workflows directory if it doesn't exist
      #     mkdir -p .github/workflows
      #
      #     # Copy security-gate workflow template
      #     if [ -f "security-tools/enterprise-security-governance/templates/.github-workflows-security-gate.yml" ]; then
      #       cp security-tools/enterprise-security-governance/templates/.github-workflows-security-gate.yml .github/workflows/security-gate.yml
      #       git add .github/workflows/security-gate.yml
      #       echo "security_gate_deployed=true" >> $GITHUB_ENV
      #       echo "✅ Security gate workflow deployed"
      #     else
      #       echo "⚠️  Warning: Template security-gate.yml not found"
      #     fi

      - name: Deploy Client-Side Package Manager Protection (Layer 0)
        if: steps.detect.outputs.skip == 'false'
        run: |
          echo "Deploying client-side package manager protection..."

          # Deploy .npmrc for npm/pnpm projects (if package.json exists)
          if [ -f "package.json" ]; then
            if [ -f "security-tools/enterprise-security-governance/templates/.npmrc" ]; then
              cp security-tools/enterprise-security-governance/templates/.npmrc .npmrc
              git add .npmrc
              echo "✅ npm/pnpm protection deployed (.npmrc)"
              echo "npmrc_deployed=true" >> $GITHUB_ENV
            fi

            # Deploy bunfig.toml for bun projects
            if [ -f "security-tools/enterprise-security-governance/templates/.bunfig.toml" ]; then
              cp security-tools/enterprise-security-governance/templates/.bunfig.toml bunfig.toml
              git add bunfig.toml
              echo "✅ bun protection deployed (bunfig.toml)"
              echo "bunfig_deployed=true" >> $GITHUB_ENV
            fi
          fi

          # Deploy uv settings for Python projects (merge into pyproject.toml)
          if [ -f "pyproject.toml" ]; then
            # Check if [tool.uv] section already exists
            if ! grep -q "\[tool\.uv\]" pyproject.toml; then
              echo "" >> pyproject.toml
              echo "[tool.uv]" >> pyproject.toml
              echo 'exclude-newer = "7days"' >> pyproject.toml
              echo 'prefer-binary = true' >> pyproject.toml
              git add pyproject.toml
              echo "✅ uv protection deployed (pyproject.toml)"
              echo "uv_config_deployed=true" >> $GITHUB_ENV
            else
              echo "⚠️  [tool.uv] already exists in pyproject.toml, skipping"
            fi
          fi

      - name: Create Compliance Branch
        if: steps.detect.outputs.skip == 'false' && inputs.dry_run == false
        run: |
          git config user.name "Enterprise Security Bot"
          git config user.email "secops@h2o.ai"

          branch_name="security/compliance-lockfile-enforcement-$(date +%Y%m%d)"
          git checkout -b $branch_name

          if [ -f "package-lock.json" ]; then
            git add package-lock.json
          fi

          if [ -f "uv.lock" ]; then
            git add uv.lock
          fi

          if [ -f "requirements.lock" ]; then
            git add requirements.lock
          fi

          if [ -f "go.sum" ]; then
            git add go.sum
          fi

          if [ -f "gradle.lockfile" ]; then
            git add gradle.lockfile
          fi

          if [ -f ".github/dependabot.yml" ]; then
            git add .github/dependabot.yml
          fi

          git commit -m "chore: Add dependency lockfiles and Dependabot cooldown policy

          This PR adds missing lockfiles and native Dependabot supply chain protection.

          Changes:
          $([ -f "package-lock.json" ] && echo "  - ✅ package-lock.json (npm dependencies)")
          $([ -f "uv.lock" ] && echo "  - ✅ uv.lock (Python dependencies)")
          $([ -f "go.sum" ] && echo "  - ✅ go.sum (Go dependencies)")
          $([ -f "gradle.lockfile" ] && echo "  - ✅ gradle.lockfile (Java dependencies)")
          $([ -f ".github/dependabot.yml" ] && echo "  - ✅ .github/dependabot.yml (7-day cooldown policy)")

          Security Policy:
          - Dependabot will NOT create PRs for packages published < 7 days ago
          - Security updates (CVE patches) bypass cooldown automatically
          - Manual dependency updates validated by central security gate

          Generated by: Enterprise Security Governance Framework
          Documentation: https://github.com/${{ inputs.organization }}/enterprise-security-governance
          Automation: bulk-lockfile-generator workflow"

          git push origin $branch_name

          echo "branch_name=$branch_name" >> $GITHUB_ENV

      - name: Create Pull Request
        if: steps.detect.outputs.skip == 'false' && inputs.dry_run == false
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pr_body="## 🛡️ Supply Chain Security Compliance

          This automated PR adds missing lockfiles and native Dependabot supply chain protection.

          ### 📦 Changes Made:
          "

          if [ -f "package-lock.json" ]; then
            pr_body="$pr_body
          - ✅ Generated \`package-lock.json\` for npm dependencies"
          fi

          if [ -f "uv.lock" ]; then
            pr_body="$pr_body
          - ✅ Generated \`uv.lock\` for Python dependencies"
          fi

          if [ -f "go.sum" ]; then
            pr_body="$pr_body
          - ✅ Generated \`go.sum\` for Go dependencies"
          fi

          if [ -f "gradle.lockfile" ]; then
            pr_body="$pr_body
          - ✅ Generated \`gradle.lockfile\` for Java dependencies"
          fi

          if [ -f ".github/dependabot.yml" ]; then
            pr_body="$pr_body
          - ✅ Deployed \`.github/dependabot.yml\` with native **7-day cooldown policy** (Layer 1)"
          fi

          if [ "${{ env.security_gate_deployed }}" == "true" ]; then
            pr_body="$pr_body
          - ✅ Deployed \`.github/workflows/security-gate.yml\` for **PR validation** (Layer 2)"
          fi

          if [ -f ".npmrc" ]; then
            pr_body="$pr_body
          - ✅ Deployed \`.npmrc\` for **client-side npm/pnpm protection** (Layer 0)"
          fi

          if [ -f "bunfig.toml" ]; then
            pr_body="$pr_body
          - ✅ Deployed \`bunfig.toml\` for **client-side bun protection** (Layer 0)"
          fi

          if [ "${{ env.uv_config_deployed }}" == "true" ]; then
            pr_body="$pr_body
          - ✅ Updated \`pyproject.toml\` with **uv protection settings** (Layer 0)"
          fi

          pr_body="$pr_body

          ### 🔒 Multi-Layer Supply Chain Protection:

          **Layer 0: Client-Side Protection (NEW)**
          - 🛡️ Blocks \`npm install\` / \`uv pip install\` for packages < 7 days old
          - 💻 Protects developer workstation before code written
          - ✅ Config files checked into Git (automatic for all developers)

          **Layer 1: Dependabot Cooldown Policy (Server-Side)**
          - ⏸️ Dependabot will **NOT create PRs** for packages published < 7 days ago
          - ✅ Security updates (CVE patches) **bypass cooldown automatically**
          - 🔧 Patch releases: 3-day cooldown (faster for bug fixes)
          - 📦 Feature updates: 7-day cooldown (full protection)
          - 🚨 Major versions: 14-day cooldown (extended review period)

          **Layer 2: Central Security Gate (Validation)**
          - Validates manual dependency updates by developers
          - Enforces break-glass allowlist policy
          - Audit trail sent to Coralogix SIEM

          **Layer 3: Observability**
          - All security events logged to Coralogix
          - Real-time alerting for violations
          - Compliance audit trail

          ### ✅ Next Steps:
          1. Review the lockfiles for unexpected dependencies
          2. Verify \`.github/dependabot.yml\` configuration
          3. Merge this PR to enable native supply chain protection
          4. Future Dependabot PRs will respect cooldown periods

          ### 📚 Documentation:
          - [Native Cooldown Migration Guide](https://github.com/${{ inputs.organization }}/enterprise-security-governance/blob/main/docs/NATIVE-COOLDOWN-MIGRATION.md)
          - [Dependabot Integration](https://github.com/${{ inputs.organization }}/enterprise-security-governance/blob/main/docs/DEPENDABOT-INTEGRATION.md)

          ---
          *Automated by [Enterprise Security Governance](https://github.com/${{ inputs.organization }}/enterprise-security-governance)*"

          gh pr create \
            --repo ${{ inputs.organization }}/${{ matrix.repo }} \
            --head ${{ env.branch_name }} \
            --base main \
            --title "🔒 [Security] Add dependency lockfiles for compliance" \
            --body "$pr_body" \
            --label "security,compliance,automated"

          echo "✅ Pull request created for ${{ matrix.repo }}"

      - name: Dry Run Summary
        if: inputs.dry_run == true && steps.detect.outputs.skip == 'false'
        run: |
          echo "🔍 DRY RUN: Would create PR for ${{ matrix.repo }}"
          echo "Changes detected:"
          if [ "${{ env.npm_lockfile_created }}" == "true" ]; then
            echo "  - package-lock.json"
          fi
          if [ "${{ env.python_lockfile_created }}" == "true" ]; then
            echo "  - uv.lock"
          fi
          if [ "${{ env.go_lockfile_created }}" == "true" ]; then
            echo "  - go.sum"
          fi
          if [ "${{ env.java_lockfile_created }}" == "true" ]; then
            echo "  - gradle.lockfile"
          fi

  summary:
    name: Remediation Summary
    needs: [discover-repositories, remediate-lockfiles]
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## 📊 Bulk Lockfile Remediation Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Organization:** ${{ inputs.organization }}" >> $GITHUB_STEP_SUMMARY
          echo "**Mode:** ${{ inputs.dry_run && 'Dry Run' || 'Live' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Repositories Scanned:** $(echo '${{ needs.discover-repositories.outputs.repositories }}' | jq 'length')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ inputs.dry_run }}" == "false" ]; then
            echo "✅ Pull requests created for repositories missing lockfiles" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "**Next Steps:**" >> $GITHUB_STEP_SUMMARY
            echo "1. Review and merge generated PRs" >> $GITHUB_STEP_SUMMARY
            echo "2. Verify security gates pass on future PRs" >> $GITHUB_STEP_SUMMARY
            echo "3. Monitor compliance via organization security dashboard" >> $GITHUB_STEP_SUMMARY
          else
            echo "🔍 Dry run completed - no changes made" >> $GITHUB_STEP_SUMMARY
          fi
