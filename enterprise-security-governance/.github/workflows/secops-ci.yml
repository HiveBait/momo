name: SecOps CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint and Test Security Scripts
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Development Dependencies
        run: |
          pip install pytest pytest-cov flake8 black mypy

      - name: Code Formatting Check (Black)
        run: |
          black --check scripts/

      - name: Linting (Flake8)
        run: |
          flake8 scripts/ --max-line-length=120 --ignore=E203,W503

      - name: Type Checking (MyPy)
        continue-on-error: true
        run: |
          mypy scripts/ --ignore-missing-imports

      - name: Run Unit Tests
        run: |
          pytest tests/ -v --cov=scripts --cov-report=term-missing

      - name: Validate Policy Files
        run: |
          python3 -c "import json; json.load(open('policies/allowlist.json'))"
          echo "✅ allowlist.json is valid JSON"

      - name: Security Script Smoke Test
        run: |
          python3 scripts/dependency_age_gate.py --help || true
          echo "✅ dependency_age_gate.py loads successfully"

  terraform-validation:
    name: Validate Terraform Configuration
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: '1.10.3'

      - name: Terraform Format Check
        working-directory: terraform
        run: |
          terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform
        run: |
          terraform validate

  security-scan:
    name: Security Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Trivy Security Scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy Results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
